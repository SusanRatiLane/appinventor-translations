SaveFileMethodDescriptions=يحفظ نصًا في ملف. إذا بدأ اسم الملف بشرطة مائلة (/) فسيُكتب الملف إلى sdcard. مثلًا، الكتابة إلى /myFile.txt ستكتب الملف إلى /sdcard/myFile.txt. إذا لم يبدأ اسم الملف بشرطة مائلة، فسيُكتب في مجلد البيانات الخاص بالتطبيق حيث لا يمكن للبرامج الأخرى على الهاتف الوصول إليه. يوجد استثناء خاص ل AI Companion حيث تُكتب هذه الملفات إلى /sdcard/AppInventor/data لتسهيل التصحيح. لاحظ أن هذه الكتلة ستستبدل الملف إذا كان موجودًا بالفعل. إذا أردت إضافة محتوى إلى ملف، فاستخدم كتلة الإلحاق.
RemoveItemAtIndexMethodDescriptions=يزيل عنصرًا من القائمة عند فهرس معطى
ReadFromMethodDescriptions=يقرأ نصًا من ملف في التخزين. أضف / في بداية اسم الملف للقراءة من ملف محدد على بطاقة SD؛ مثلًا /myFile.txt سيقرأ الملف /sdcard/myFile.txt. لقراءة الأصول المضمّنة مع التطبيق (ويعمل ذلك أيضًا مع Companion)، ابدأ اسم الملف ب // (شرطتين مائلتين). إذا لم يبدأ اسم الملف بشرطة مائلة، فستتم قراءته من التخزين الخاص للتطبيق (للتطبيقات المعبأة) ومن /sdcard/AppInventor/data في Companion.
ReadFileMethodDescriptions=يحدد ملف المصدر المراد تحميل البيانات منه. التنسيق المتوقع لمحتويات الملف هو إما CSV أو JSON. أضف / في بداية اسم الملف للقراءة من ملف محدد على بطاقة SD؛ مثلًا /myFile.txt سيقرأ الملف /sdcard/myFile.txt. لقراءة الأصول المضمّنة مع التطبيق (ويعمل ذلك أيضًا مع Companion)، ابدأ اسم الملف ب // (شرطتين مائلتين). إذا لم يبدأ اسم الملف بشرطة مائلة، فستتم قراءته من التخزين الخاص للتطبيق (للتطبيقات المعبأة) ومن /sdcard/AppInventor/data في Companion. تُخزَّن نتائج القراءة في خصائص Rows و Columns و ColumnNames الخاصة بالمكوّن.
