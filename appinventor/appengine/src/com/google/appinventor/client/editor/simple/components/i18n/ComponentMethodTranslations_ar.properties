JsonTextDecodeMethodDescriptions=يفك ترميز القيمة المشفرة بصيغة JSON المعطاة لإنتاج قيمة AppInventor مقابلة. تُفك قائمة JSON مثل `[x, y, z]` إلى قائمة `(x y z)`، ويُفك كائن JSON بالمفتاح A والقيمة B، (ويرمز له ب`{A:B}`) إلى قائمة `((A B))`، أي قائمة تحتوي على القائمة ثنائية العنصر `(A B)`. استخدم الطريقة JsonTextDecodeWithDictionaries إذا كنت تفضّل الحصول على كائنات قاموس بدلًا من قوائم من قوائم في النتيجة.
