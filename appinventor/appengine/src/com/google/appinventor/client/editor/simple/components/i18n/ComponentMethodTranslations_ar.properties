YandexTranslate__RequestTranslationMethodDescriptions=بتوفير لغة هدف للترجمة إليها (مثل ''es'' للإسبانية أو ''en'' للإنجليزية أو ''ru'' للروسية)، وكلمة أو جملة للترجمة، ستطلب هذه الطريقة ترجمة من خدمة Yandex.Translate. بعد ترجمة النص بواسطة الخدمة الخارجية، سيتم تنفيذ حدث GotTranslation. ملاحظة: سيحاول Yandex.Translate اكتشاف لغة المصدر. يمكنك أيضًا تحديدها بإضافتها في بداية لغة الترجمة. أي أن es-ru ستحدد الترجمة من الإسبانية إلى الروسية.
