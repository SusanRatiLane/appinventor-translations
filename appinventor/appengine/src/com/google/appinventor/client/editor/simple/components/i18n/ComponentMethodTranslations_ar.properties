UnauthenticateMethodDescriptions=إذا كنت تواجه صعوبة مع Companion وكنت تنتقل بين حسابات Firebase مختلفة، فقد تحتاج إلى استخدام هذه الدالة لمسح ذاكرات التخزين المؤقت الداخلية ل Firebase. يمكنك ببساطة استخدام دالة "Do It" على هذه الكتلة في محرر الكتل. ملاحظة: عادةً لا تحتاج إلى استخدام هذه الكتلة كجزء من تطبيق.
