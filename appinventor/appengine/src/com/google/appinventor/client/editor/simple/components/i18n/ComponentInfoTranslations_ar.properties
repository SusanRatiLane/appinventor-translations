YandexTranslateHelpStringComponentPallette=استخدم هذا المكوّن لترجمة الكلمات والجمل بين لغات مختلفة. يحتاج هذا المكوّن إلى اتصال بالإنترنت، لأنه سيطلب الترجمات من خدمة Yandex.Translate. حدّد لغة المصدر واللغة الهدف بالشكل source-target باستخدام رموز لغة من حرفين. لذلك ستترجم "en-es" من الإنجليزية إلى الإسبانية بينما ستترجم "es-ru" من الإسبانية إلى الروسية. إذا تركت لغة المصدر، فستحاول الخدمة اكتشاف لغة المصدر. لذلك، فإن تقديم "es" فقط سيحاول اكتشاف لغة المصدر وترجمتها إلى الإسبانية.<p /> هذا المكوّن مدعوم بخدمة ترجمة Yandex. راجع http://api.yandex.com/translate/ لمزيد من المعلومات، بما في ذلك قائمة اللغات المتاحة ومعاني رموز اللغات ورموز الحالة. <p />ملاحظة: تحدث الترجمة بشكل غير متزامن في الخلفية. عند اكتمال الترجمة، يُطلق حدث "GotTranslation".
WebViewerHelpStringComponentPallette=مكوّن لعرض صفحات الويب. يمكن تحديد عنوان URL الرئيسي في المصمم أو في محرر الكتل. يمكن ضبط العرض لاتباع الروابط عند النقر عليها، ويمكن للمستخدمين تعبئة نماذج الويب. تحذير: هذا ليس متصفحًا كاملًا. على سبيل المثال، سيؤدي الضغط على مفتاح الرجوع المادي في الهاتف إلى الخروج من التطبيق، بدلًا من الرجوع في سجل المتصفح.<p />يمكنك استخدام خاصية WebViewer.WebViewString للتواصل بين تطبيقك وشيفرة Javascript تعمل في صفحة Webviewer. في التطبيق، تحصل على WebViewString وتعيّنها. في WebViewer، تُدرج Javascript تشير إلى الكائن window.AppInventor، باستخدام الدالتين </em getWebViewString()</em> و<em>setWebViewString(text)</em>. <p />على سبيل المثال، إذا فتح WebViewer صفحة تحتوي على أمر Javascript التالي <br /> <em>document.write("The answer is" + window.AppInventor.getWebViewString());</em> <br />وقمت بتعيين WebView.WebVewString إلى "hello"، فستعرض صفحة الويب </br ><em>The answer is hello</em>. <br />وإذا كانت صفحة الويب تحتوي على Javascript ينفذ الأمر <br /><em>window.AppInventor.setWebViewString("hello from Javascript")</em>, <br />فستكون قيمة خاصية WebViewString هي <br /><em>hello from Javascript</em>.
WebHelpStringComponentPallette=مكوّن غير مرئي يوفر دوال لطلبات HTTP من نوع GET وPOST وPUT وDELETE.
VotingHelpStringComponentPallette=يتواصل مكوّن Voting مع خدمة ويب لاسترجاع بطاقة اقتراع وإرسال أصوات المستخدمين. <p>ينبغي للتطبيق استدعاء الدالة <code>RequestBallot</code>، عادةً في معالج حدث <code>Initialize</code>، للحصول على سؤال الاقتراع وخياراته من خدمة الويب (المحددة بواسطة خاصية <code>ServiceURL</code>). بناءً على الاستجابة من خدمة الويب، سيطلق النظام واحدًا من الأحداث الثلاثة التالية: <ol> <li> <code>GotBallot</code>، مما يشير إلى أنه تم استرجاع سؤال الاقتراع وخياراته وتم تعيين الخاصيتين <code>BallotQuestion</code> و<code>BallotOptions</code>.</li> <li> <code>NoOpenPoll</code>، مما يشير إلى عدم توفر سؤال اقتراع.</li> <li> <code>WebServiceError</code>، مما يشير إلى أن الخدمة لم تقدم استجابة صالحة ويوفر رسالة خطأ.</li> </ol></p> <p>بعد الحصول على بطاقة الاقتراع، ينبغي للتطبيق أن يسمح للمستخدم بالاختيار من بين <code>BallotOptions</code> وأن يعيّن خاصية <code>UserChoice</code> إلى ذلك الاختيار. وينبغي للتطبيق أيضًا تعيين <code>UserId</code> لتحديد المستخدم الذي يصوت.</p> <p>بمجرد أن يعيّن التطبيق <code>UserChoice</code> و<code>UserId</code>، يمكن للتطبيق استدعاء <code>SendBallot</code> لإرسال هذه المعلومات إلى خدمة الويب. إذا استلمت الخدمة التصويت بنجاح، فسيُطلق حدث <code>GotBallotConfirmation</code>. وإلا فسيُطلق حدث <code>WebServiceError</code> مع رسالة الخطأ المناسبة.</p>
VideoPlayerHelpStringComponentPallette=مكوّن وسائط متعددة قادر على تشغيل مقاطع الفيديو. عند تشغيل التطبيق، سيظهر VideoPlayer كمستطيل على الشاشة. إذا لمس المستخدم المستطيل، فستظهر عناصر تحكم للتشغيل/الإيقاف المؤقت، والتقديم، والترجيع داخل الفيديو. يمكن للتطبيق أيضًا التحكم في السلوك باستدعاء الدوال <code>Start</code> و<code>Pause</code> و<code>SeekTo</code>. <p>يجب أن تكون ملفات الفيديو بتنسيق 3GPP (.3gp) أو MPEG-4 (.mp4). لمزيد من التفاصيل حول التنسيقات القانونية، راجع <a href="http://developer.android.com/guide/appendix/media-formats.html" target="_blank">صيغ الوسائط المدعومة في Android</a>.</p><p>يسمح App Inventor لنظام Android فقط بملفات فيديو أقل من 1 MB ويحد الحجم الإجمالي للتطبيق إلى 5 MB، وليس كل ذلك متاحًا لملفات الوسائط (الفيديو والصوت والمؤثرات). إذا كانت ملفات الوسائط لديك كبيرة جدًا، فقد تحصل على أخطاء عند تحزيم تطبيقك أو تثبيته، وفي هذه الحالة يجب عليك تقليل عدد ملفات الوسائط أو أحجامها. يمكن لمعظم برامج تحرير الفيديو، مثل Windows Movie Maker وApple iMovie، مساعدتك في تقليل حجم الفيديوهات بتقصيرها أو إعادة ترميز الفيديو إلى تنسيق أكثر ضغطًا.</p><p>يمكنك أيضًا تعيين مصدر الوسائط إلى URL يشير إلى فيديو متدفق، لكن يجب أن يشير URL إلى ملف الفيديو نفسه، وليس إلى برنامج يشغل الفيديو.
VerticalScrollArrangementHelpStringComponentPallette=<p>عنصر تنسيق توضع فيه المكوّنات التي يجب عرضها واحدًا تحت الآخر. (يُخزن المكوّن الفرعي الأول في الأعلى، والثاني تحته، وهكذا.) إذا كنت تريد عرض المكوّنات بجانب بعضها، فاستخدم <code>HorizontalArrangement</code> بدلًا من ذلك.</p><p> هذا الإصدار قابل للتمرير
VerticalArrangementHelpStringComponentPallette=<p>عنصر تنسيق توضع فيه المكوّنات التي يجب عرضها واحدًا تحت الآخر. (يُخزن المكوّن الفرعي الأول في الأعلى، والثاني تحته، وهكذا.) إذا كنت تريد عرض المكوّنات بجانب بعضها، فاستخدم <code>HorizontalArrangement</code> بدلًا من ذلك.</p>
TwitterHelpStringComponentPallette=مكوّن غير مرئي يتيح التواصل مع <a href="http://www.twitter.com" target="_blank">Twitter</a>. بعد تسجيل المستخدم الدخول إلى حساب Twitter الخاص به (وتأكيد نجاح التفويض بواسطة حدث <code>IsAuthorized</code>)، تتوفر عمليات كثيرة أخرى:<ul><li> البحث في Twitter عن تغريدات أو وسوم (<code>SearchTwitter</code>)</li><li> إرسال تغريدة (<code>Tweet</code>) </li><li> إرسال تغريدة مع صورة (<code>TweetWithImage</code>) </li><li> توجيه رسالة إلى مستخدم محدد (<code>DirectMessage</code>)</li> <li> استقبال أحدث الرسائل الموجهة إلى المستخدم المسجل الدخول (<code>RequestDirectMessages</code>)</li> <li> متابعة مستخدم محدد (<code>Follow</code>)</li><li> التوقف عن متابعة مستخدم محدد (<code>StopFollowing</code>)</li><li> الحصول على قائمة بالمستخدمين الذين يتابعون المستخدم المسجل الدخول (<code>RequestFollowers</code>)</li> <li> الحصول على أحدث رسائل المستخدمين الذين يتابعهم المستخدم المسجل الدخول (<code>RequestFriendTimeline</code>)</li> <li> الحصول على أحدث الإشارات إلى المستخدم المسجل الدخول (<code>RequestMentions</code>)</li></ul></p> <p>يجب أن تحصل على Consumer Key وConsumer Secret لتفويض Twitter خاصين بتطبيقك من http://twitter.com/oauth_clients/new
TrendlineHelpStringComponentPallette=مكوّن يتنبأ بنموذج أفضل ملاءمة لسلسلة بيانات معيّنة.
TranslatorHelpStringComponentPallette=استخدم هذا المكوّن لترجمة الكلمات والجمل بين لغات مختلفة. يحتاج هذا المكوّن إلى اتصال بالإنترنت، لأنه سيطلب الترجمات من خادم في MIT (والذي بدوره سيطلب الترجمات من خدمة ترجمة تجارية). حدّد لغة المصدر واللغة الهدف بالشكل source-target باستخدام رموز لغة من حرفين. لذلك ستترجم "en-es" من الإنجليزية إلى الإسبانية بينما ستترجم "es-ru" من الإسبانية إلى الروسية. إذا تركت لغة المصدر، فستحاول الخدمة اكتشاف لغة المصدر. لذلك، فإن تقديم "es" فقط سيحاول اكتشاف لغة المصدر وترجمتها إلى الإسبانية. <i>ملاحظة</i>: تحدث الترجمة بشكل غير متزامن في الخلفية. عند اكتمال الترجمة، يُطلق حدث <b>GotTranslation(String, String)</b>.
TinyWebDBHelpStringComponentPallette=مكوّن غير مرئي يتواصل مع خدمة ويب لتخزين المعلومات واسترجاعها.
TinyDBHelpStringComponentPallette=TinyDB هو مكوّن غير مرئي يخزن البيانات لتطبيق ما. <p> تُهيأ التطبيقات المنشأة باستخدام App Inventor في كل مرة تُشغَّل فيها: إذا عيّن تطبيق قيمة متغيّر ثم خرج المستخدم من التطبيق، فلن تُتذكر قيمة ذلك المتغيّر في المرة التالية التي يُشغّل فيها التطبيق. وعلى النقيض من ذلك، فإن TinyDB هو مخزن بيانات <em> دائم </em> للتطبيق، أي إن البيانات المخزنة فيه ستكون متاحة كل مرة يُشغّل فيها التطبيق. قد يكون المثال لعبة تحفظ أعلى نتيجة وتسترجعها كل مرة تُلعب فيها اللعبة. </<p> <p> عناصر البيانات هي سلاسل مخزنة تحت <em>وسوم</em> . لتخزين عنصر بيانات، تحدد الوسم الذي يجب تخزينه تحته. بعد ذلك، يمكنك استرجاع البيانات التي خُزنت تحت وسم معين. </p><p> يوجد مخزن بيانات واحد فقط لكل تطبيق. حتى إذا كان لديك عدة مكوّنات TinyDB، فستستخدم مخزن البيانات نفسه. للحصول على تأثير مخازن منفصلة، استخدم مفاتيح مختلفة. كما أن لكل تطبيق مخزن بياناته الخاص. لا يمكنك استخدام TinyDB لتمرير البيانات بين تطبيقين مختلفين على الهاتف، مع أنك <em>تستطيع</em> استخدام TinyDb لمشاركة البيانات بين الشاشات المختلفة في تطبيق متعدد الشاشات. </p> <p>عند تطوير التطبيقات باستخدام AI Companion، ستشارك كل التطبيقات التي تستخدم ذلك المصاحب TinyDb نفسه. ستختفي هذه المشاركة بمجرد تحزيم التطبيقات. لكن أثناء التطوير، يجب أن تحرص على مسح TinyDb كل مرة تبدأ فيها العمل على تطبيق جديد.</p>
TimePickerHelpStringComponentPallette=<p>زر يفتح، عند النقر عليه، مربع حوار منبثقًا يتيح للمستخدم اختيار وقت.</p>
ThermometerHelpStringComponentPallette=مكوّن مستشعر يمكنه قياس درجة الحرارة المحيطة (الخارجية). لا تحتوي معظم أجهزة Android على هذا المستشعر.
TextToSpeechHelpStringComponentPallette=ينطق مكوّن TextToSpeech نصًا معيّنًا بصوت مسموع. يمكنك تعيين درجة الصوت ومعدل الكلام. <p>يمكنك أيضًا تعيين لغة بتوفير رمز لغة. يغيّر هذا نطق الكلمات، وليس اللغة المنطوقة الفعلية. على سبيل المثال، تعيين اللغة إلى الفرنسية ونطق نص إنجليزي سيبدو مثل شخص يتحدث الإنجليزية (en) بلكنة فرنسية.</p> <p>يمكنك أيضًا تحديد بلد بتوفير رمز بلد. يمكن أن يؤثر هذا في النطق. على سبيل المثال، ستبدو الإنجليزية البريطانية (GBR) مختلفة عن الإنجليزية الأمريكية (USA). ليس كل رمز بلد سيؤثر في كل لغة.</p> <p>تعتمد اللغات والبلدان المتاحة على الجهاز المحدد، ويمكن سردها باستخدام خاصيتي AvailableLanguages وAvailableCountries.</p>
TextBoxHelpStringComponentPallette=<p>مربع يتيح للمستخدم إدخال نص. توجد قيمة النص الأولية أو التي أدخلها المستخدم في خاصية <code>Text</code>. إذا كان فارغًا، يمكن لخاصية <code>Hint</code>، التي تظهر كنص باهت في المربع، أن تقدم إرشادًا للمستخدم حول ما يكتبه.</p><p>تحدد خاصية <code>MultiLine</code> ما إذا كان النص يمكن أن يحتوي على أكثر من سطر واحد. بالنسبة إلى مربع نص بسطر واحد، ستُغلق لوحة المفاتيح تلقائيًا عندما يضغط المستخدم على مفتاح Done. لإغلاق لوحة المفاتيح في مربعات النص متعددة الأسطر، يجب على التطبيق استخدام دالة HideKeyboard أو الاعتماد على المستخدم للضغط على مفتاح Back.</p><p>تقيّد خاصية <code> NumbersOnly</code> لوحة المفاتيح لقبول الإدخال الرقمي فقط.</p><p>تؤثر خصائص أخرى في مظهر مربع النص (<code>TextAlignment</code> و<code>BackgroundColor</code> وغيرها) وفي ما إذا كان يمكن استخدامه (<code>Enabled</code>).</p><p>عادةً ما تُستخدم مربعات النص مع مكوّن <code>Button</code>، حيث ينقر المستخدم على الزر عند اكتمال إدخال النص.</p><p>إذا كان النص الذي أدخله المستخدم يجب ألا يُعرض، فاستخدم <code>PasswordTextBox</code> بدلًا من ذلك.</p>
TableArrangementHelpStringComponentPallette=<p>عنصر تنسيق توضع فيه المكوّنات التي يجب عرضها على شكل جدول.</p>
SwitchHelpStringComponentPallette=مفتاح تبديل يطلق حدثًا عندما ينقر عليه المستخدم. توجد خصائص كثيرة تؤثر في مظهره ويمكن تعيينها في المصمم أو محرر الكتل.
SpreadsheetHelpStringComponentPallette=Spreadsheet هو مكوّن غير مرئي لتخزين البيانات واستقبالها من مستند جدول بيانات باستخدام Google Sheets API. <p>لاستخدام هذا المكوّن، يجب أن يكون لدى الشخص أولًا حساب Google Developer. ثم يجب إنشاء مشروع جديد ضمن حساب Google Developer ذلك، وتفعيل Google Sheets API في ذلك المشروع، وأخيرًا إنشاء حساب خدمة لواجهة Sheets API.</p><p>يمكن العثور على تعليمات إنشاء حساب الخدمة، وكذلك مكان العثور على معلومات أخرى ذات صلة باستخدام مكوّن Spreadsheet، <a href=''/reference/other/googlesheets-api-setup.html''>هنا</a>.</p>
SpinnerHelpStringComponentPallette=<p>مكوّن قائمة دوّارة يعرض نافذة منبثقة تحتوي على قائمة عناصر. يمكن تعيين هذه العناصر في المصمم أو محرر الكتل بتعيين الخاصية <code>ElementsFromString</code> إلى تجميع مفصول بسلاسل (على سبيل المثال، <em>choice 1, choice 2, choice 3</em>) أو بتعيين خاصية <code>Elements</code> إلى قائمة في محرر الكتل. تُنشأ القوائم الدوّارة والعنصر الأول محدد مسبقًا. لذلك فإن اختياره لا يولد حدث After Picking. وبناءً على ذلك، من المفيد جعل العنصر الأول في Spinner خيارًا غير فعلي مثل "Select from below...". </p>
SpeechRecognizerHelpStringComponentPallette=مكوّن لاستخدام التعرف على الصوت للتحويل من الكلام إلى نص
SoundRecorderHelpStringComponentPallette=<p>مكوّن وسائط متعددة يسجل الصوت.</p>
SoundHelpStringComponentPallette=<p>مكوّن وسائط متعددة يشغل ملفات الصوت ويمكنه اختياريًا الاهتزاز لعدد المللي ثواني (أجزاء من الألف من الثانية) المحدد في محرر الكتل. يمكن تحديد اسم ملف الصوت المراد تشغيله إما في المصمم أو في محرر الكتل.</p> <p>لصيغ ملفات الصوت المدعومة، راجع <a href="http://developer.android.com/guide/appendix/media-formats.html" target="_blank">صيغ الوسائط المدعومة في Android</a>.</p><p>مكوّن <code>Sound</code> هذا أفضل لملفات الصوت القصيرة، مثل المؤثرات الصوتية، بينما يكون مكوّن <code>Player</code> أكثر كفاءة للأصوات الأطول، مثل الأغاني.</p><p>قد تحصل على خطأ إذا حاولت تشغيل صوت فورًا بعد تعيين المصدر.</p>
SliderHelpStringComponentPallette=Slider هو شريط تقدم يضيف مقبضًا قابلًا للسحب. يمكنك لمس المقبض وسحبه يسارًا أو يمينًا لتعيين موضع مقبض المنزلق. أثناء سحب مقبض Slider، سيؤدي ذلك إلى تشغيل حدث PositionChanged، مع الإبلاغ عن موضع مقبض Slider. ويمكن استخدام الموضع المُبلغ عنه لمقبض Slider لتحديث سمة مكوّن آخر ديناميكيًا، مثل حجم خط TextBox أو نصف قطر Ball.
SharingHelpStringComponentPallette=Sharing هو مكوّن غير مرئي يتيح مشاركة الملفات و/أو الرسائل بين تطبيقك وتطبيقات أخرى مثبتة على الجهاز. سيعرض المكوّن قائمة بالتطبيقات المثبتة التي يمكنها التعامل مع المعلومات المقدمة، وسيسمح للمستخدم باختيار أحدها لمشاركة المحتوى معه، مثل تطبيق بريد أو تطبيق شبكة اجتماعية أو تطبيق رسائل نصية، وما إلى ذلك.<br>يمكن أخذ مسار الملف مباشرة من مكوّنات أخرى مثل Camera أو ImagePicker، ويمكن أيضًا تحديده مباشرة للقراءة من التخزين. السلوك الافتراضي هو مشاركة الملفات من دليل البيانات الخاص المرتبط بتطبيقك. إذا بدأ مسار الملف بشرطة مائلة (/)، فستُشارك الملف نسبة إلى /.<br>انتبه إلى أن الأجهزة المختلفة تتعامل مع التخزين بطرق مختلفة، لذلك من الأشياء التي يمكنك تجربتها إذا كان لديك، على سبيل المثال، ملف باسم arrow.gif في المجلد <code>Appinventor/assets</code> ما يلي: <ul><li><code>"file:///sdcard/Appinventor/assets/arrow.gif"</code></li> أو <li><code>"/storage/Appinventor/assets/arrow.gif"</code></li></ul>
SerialHelpStringComponentPallette=مكوّن تسلسلي يمكن استخدامه للاتصال بأجهزة مثل Arduino
ScreenHelpStringComponentPallette=مكوّن من المستوى الأعلى يحتوي على كل المكوّنات الأخرى في البرنامج
RegressionHelpStringComponentPallette=مكوّن يحتوي على نماذج انحدار
RectangleHelpStringComponentPallette=المستطيلات هي مضلعات ذات خطوط عرض وطول ثابتة للحدود الشمالية والجنوبية والشرقية والغربية. يؤدي تحريك رأس من رؤوس Rectangle إلى تحديث الحواف المناسبة وفقًا لذلك.
ProximitySensorHelpStringComponentPallette=<p>مكوّن غير مرئي يمكنه قياس قرب جسم بالسنتيمتر بالنسبة إلى شاشة عرض الجهاز. يُستخدم هذا المستشعر عادةً لتحديد ما إذا كان الهاتف المحمول مرفوعًا إلى أذن شخص؛ أي إنه يتيح لك تحديد مدى بُعد جسم ما عن الجهاز. تُعيد كثير من الأجهزة المسافة المطلقة بالسنتيمتر، لكن بعضها يعيد فقط قيمتي قريب وبعيد. في هذه الحالة، يبلغ المستشعر عادةً عن قيمة مداه القصوى في حالة البعيد، وقيمة أقل في حالة القريب.</p>
PolygonHelpStringComponentPallette=يحيط Polygon بمساحة ثنائية الأبعاد اختيارية على الخريطة. يمكن استخدام المضلعات لرسم محيط، مثل حرم جامعي أو مدينة أو دولة. تبدأ المضلعات كمثلثات أساسية. يمكن إنشاء رؤوس جديدة بسحب نقطة منتصف مضلع بعيدًا عن الحافة. يؤدي النقر على رأس إلى إزالة ذلك الرأس، لكن يجب أن توجد 3 رؤوس كحد أدنى في كل الأوقات.
PlayerHelpStringComponentPallette=مكوّن وسائط متعددة يشغل الصوت ويتحكم في اهتزاز الهاتف. يُحدد اسم ملف الوسائط المتعددة في خاصية <code>Source</code>، والتي يمكن تعيينها في المصمم أو في محرر الكتل. وتُحدد مدة الاهتزاز في محرر الكتل بالمللي ثانية (أجزاء من الألف من الثانية).<p>لصيغ الصوت المدعومة، راجع <a href="http://developer.android.com/guide/appendix/media-formats.html" target="_blank">صيغ الوسائط المدعومة في Android</a>.</p><p>هذا المكوّن أفضل للملفات الصوتية الطويلة مثل الأغاني، بينما يكون مكوّن <code>Sound</code> أكثر كفاءة للملفات القصيرة مثل المؤثرات الصوتية.</p>
PhoneStatusHelpStringComponentPallette=مكوّن يعيد معلومات عن الهاتف.
PhoneNumberPickerHelpStringComponentPallette=زر يعرض، عند النقر عليه، قائمة بأرقام هواتف جهات الاتصال للاختيار منها. بعد أن يحدد المستخدم اختيارًا، ستُعيّن الخصائص التالية بمعلومات عن جهة الاتصال المختارة: <ul><li> <code>ContactName</code>: اسم جهة الاتصال </li> <li> <code>PhoneNumber</code>: رقم هاتف جهة الاتصال </li> <li> <code>EmailAddress</code>: عنوان بريد جهة الاتصال الإلكتروني </li> <li> <code>Picture</code>: اسم الملف الذي يحتوي على صورة جهة الاتصال، ويمكن استخدامه كقيمة لخاصية <code>Picture</code> لمكوّن <code>Image</code> أو <code>ImageSprite</code>.</li></ul></p><p>تؤثر خصائص أخرى في مظهر الزر (<code>TextAlignment</code> و<code>BackgroundColor</code> وغيرها) وفي ما إذا كان يمكن النقر عليه (<code>Enabled</code>).</p><p>قد لا يعمل مكوّن PhoneNumberPicker على كل أجهزة Android. على سبيل المثال، في أنظمة Android قبل النظام 3.0، ستكون قوائم أرقام الهواتف وعناوين البريد الإلكتروني المعادة فارغة.
PhoneCallHelpStringComponentPallette=<p>مكوّن غير مرئي يجري مكالمة هاتفية إلى الرقم المحدد في خاصية <code>PhoneNumber</code>، ويمكن تعيينه إما في المصمم أو في محرر الكتل. يحتوي المكوّن على دالة <code>MakePhoneCall</code>، ما يمكّن البرنامج من بدء مكالمة هاتفية.</p><p>غالبًا ما يُستخدم هذا المكوّن مع مكوّن <code>ContactPicker</code>، الذي يتيح للمستخدم اختيار جهة اتصال من جهات الاتصال المخزنة على الهاتف ويعيّن خاصية <code>PhoneNumber</code> إلى رقم هاتف جهة الاتصال.</p><p>لتحديد رقم الهاتف مباشرة (مثل 650-555-1212)، عيّن خاصية <code>PhoneNumber</code> إلى نص يحتوي على الأرقام المحددة (مثل "6505551212"). يمكن تضمين الشرطات والنقاط والأقواس (مثل "(650)-555-1212") لكنها ستُتجاهل؛ ولا يمكن تضمين المسافات.</p>
PedometerHelpStringComponentPallette=مكوّن يعمل مثل عدّاد الخطوات. يستشعر الحركة عبر مستشعر التسارع ويحاول تحديد ما إذا كان قد تم اتخاذ خطوة. وباستخدام طول خطوة قابل للتهيئة، يمكنه تقدير المسافة المقطوعة أيضًا.
PasswordTextBoxHelpStringComponentPallette=<p>مربع لإدخال كلمات المرور. وهو مثل مكوّن <code>TextBox</code> العادي باستثناء أنه لا يعرض الأحرف التي يكتبها المستخدم.</p><p>يمكن العثور على قيمة النص في المربع أو تعيينها من خلال خاصية <code>Text</code>. إذا كان فارغًا، يمكن لخاصية <code>Hint</code>، التي تظهر كنص باهت في المربع، أن تقدم إرشادًا للمستخدم حول ما يكتبه.</p> <p>عادةً ما تُستخدم مربعات النص مع مكوّن <code>Button</code>، حيث ينقر المستخدم على الزر عند اكتمال إدخال النص.</p>
OrientationSensorHelpStringComponentPallette=<p>مكوّن غير مرئي يوفر معلومات عن الاتجاه الفيزيائي للجهاز في ثلاثة أبعاد: <ul> <li> <strong>Roll</strong>: يكون 0 درجة عندما يكون الجهاز مستويًا، ويزداد إلى 90 درجة عند إمالة الجهاز إلى الأعلى على جانبه الأيسر، وينخفض إلى -90 درجة عند إمالة الجهاز إلى الأعلى على جانبه الأيمن. </li> <li> <strong>Pitch</strong>: يكون 0 درجة عندما يكون الجهاز مستويًا، ويصل إلى 90 درجة عند إمالة الجهاز بحيث يشير أعلاه إلى الأسفل، ويصل إلى 180 درجة عندما ينقلب. وبالمثل، عندما يُمال الجهاز بحيث يشير أسفله إلى الأسفل، ينخفض pitch إلى -90 درجة، ثم ينخفض أكثر إلى -180 درجة عندما ينقلب تمامًا.</li> <li> <strong>Azimuth</strong>: يكون 0 درجة عندما يشير أعلى الجهاز إلى الشمال، و90 درجة عندما يشير إلى الشرق، و180 درجة عندما يشير إلى الجنوب، و270 درجة عندما يشير إلى الغرب، وهكذا.</li></ul> تفترض هذه القياسات أن الجهاز نفسه لا يتحرك.</p>
NxtUltrasonicSensorHelpStringComponentPallette=مكوّن يوفر واجهة عالية المستوى لمستشعر فوق صوتي في روبوت LEGO MINDSTORMS NXT.
NxtTouchSensorHelpStringComponentPallette=مكوّن يوفر واجهة عالية المستوى لمستشعر لمس في روبوت LEGO MINDSTORMS NXT.
NxtSoundSensorHelpStringComponentPallette=مكوّن يوفر واجهة عالية المستوى لمستشعر صوت في روبوت LEGO MINDSTORMS NXT.
NxtLightSensorHelpStringComponentPallette=مكوّن يوفر واجهة عالية المستوى لمستشعر ضوء في روبوت LEGO MINDSTORMS NXT.
NxtDriveHelpStringComponentPallette=مكوّن يوفر واجهة عالية المستوى لروبوت LEGO MINDSTORMS NXT، مع دوال يمكنها تحريك الروبوت وتدويره.
NxtDirectCommandsHelpStringComponentPallette=مكوّن يوفر واجهة منخفضة المستوى لروبوت LEGO MINDSTORMS NXT، مع دوال لإرسال أوامر NXT المباشرة.
NxtColorSensorHelpStringComponentPallette=مكوّن يوفر واجهة عالية المستوى لمستشعر ألوان في روبوت LEGO MINDSTORMS NXT.
NotifierHelpStringComponentPallette=يعرض مكوّن Notifier مربعات حوار تنبيه ورسائل وتنبيهات مؤقتة، وينشئ إدخالات في سجل Android من خلال الدوال التالية: <ul><li> ShowMessageDialog: يعرض رسالة يجب على المستخدم إغلاقها بالضغط على زر.</li><li> ShowChooseDialog: يعرض رسالة مع زرين ليختار المستخدم أحد استجابتين، مثل نعم أو لا، وبعد ذلك يُطلق حدث AfterChoosing.</li><li> ShowTextDialog: يتيح للمستخدم إدخال نص ردًا على الرسالة، وبعد ذلك يُطلق حدث AfterTextInput. <li> ShowPasswordDialog: يتيح للمستخدم إدخال كلمة مرور ردًا على الرسالة، وبعد ذلك يُطلق حدث AfterTextInput. <li> ShowAlert: يعرض تنبيهًا مؤقتًا يختفي من تلقاء نفسه بعد وقت قصير.</li><li> ShowProgressDialog: يعرض تنبيهًا مع مؤشر تحميل دوّار لا يمكن للمستخدم إغلاقه. ولا يمكن إغلاقه إلا باستخدام كتلة DismissProgressDialog.</li><li> DismissProgressDialog: يغلق مربع حوار التقدم المعروض بواسطة ShowProgressDialog.</li><li> LogError: يسجل رسالة خطأ في سجل Android. </li><li> LogInfo: يسجل رسالة معلومات في سجل Android.</li><li> LogWarning: يسجل رسالة تحذير في سجل Android.</li><li>يمكن تنسيق الرسائل في مربعات الحوار (لكن ليس التنبيه) باستخدام وسوم HTML التالية:&lt;b&gt;, &lt;big&gt;, &lt;blockquote&gt;, &lt;br&gt;, &lt;cite&gt;, &lt;dfn&gt;, &lt;div&gt;, &lt;em&gt;, &lt;small&gt;, &lt;strong&gt;, &lt;sub&gt;, &lt;sup&gt;, &lt;tt&gt;. &lt;u&gt;</li><li>يمكنك أيضًا استخدام وسم font لتحديد اللون، على سبيل المثال، &lt;font color="blue"&gt;. بعض أسماء الألوان المتاحة هي aqua وblack وblue وfuchsia وgreen وgrey وlime وmaroon وnavy وolive وpurple وred وsilver وteal وwhite وyellow</li></ul>
NearFieldHelpStringComponentPallette=<p>مكوّن غير مرئي لتوفير إمكانات NFC. في الوقت الحالي يدعم هذا المكوّن قراءة وكتابة وسوم النص فقط (إذا كان الجهاز يدعم ذلك)</p><p>لقراءة وسوم النص وكتابتها، يجب تعيين خاصية <code>ReadMode</code> الخاصة بالمكوّن إلى True أو False على التوالي.</p><p><strong>ملاحظة:</strong> سيعمل هذا المكوّن فقط على Screen1 في أي تطبيق App Inventor.</p>
NavigationHelpStringComponentPallette=الملاحة
MediaStoreHelpStringComponentPallette=مكوّن غير مرئي يتواصل مع خدمة ويب ويخزّن ملفات الوسائط.
MarkerHelpStringComponentPallette=<p>أيقونة موضوعة عند نقطة للإشارة إلى معلومات على الخريطة. يمكن استخدام العلامات لتوفير نافذة معلومات، وألوان تعبئة وحدود مخصصة، وصور مخصصة لنقل المعلومات إلى المستخدم.</p>
MapHelpStringComponentPallette=<p>حاوية ثنائية الأبعاد تعرض مربعات الخرائط في الخلفية وتسمح لعناصر Marker متعددة بتحديد نقاط على الخريطة. تُوفر مربعات الخرائط بواسطة مساهمي OpenStreetMap والمسح الجيولوجي للولايات المتحدة.</p><p>يوفر مكوّن Map ثلاث أدوات للتعامل مع حدوده داخل App Inventor. أولًا، توجد آلية قفل للسماح بتحريك الخريطة بالنسبة إلى المكوّنات الأخرى على الشاشة. ثانيًا، عندما تكون غير مقفلة، يمكن للمستخدم سحب الخريطة إلى أي موقع. وفي هذا الموقع الجديد، يمكن الضغط على زر &quot;Set Initial Boundary&quot; لحفظ إحداثيات Map الحالية في خصائصه. وأخيرًا، إذا نُقلت الخريطة إلى موقع مختلف، مثلًا لإضافة Markers خارج الشاشة، فيمكن استخدام زر &quot;Reset Map to Initial Bounds&quot; لإعادة توسيط Map في موقع البداية.</p>
MagneticFieldSensorHelpStringComponentPallette=<p>مكوّن غير مرئي يقيس المجال الجيومغناطيسي المحيط لكل المحاور الفيزيائية الثلاثة (x, y, z) بوحدة تسلا https://en.wikipedia.org/wiki/Tesla_(unit).</p>
LocationSensorHelpStringComponentPallette=مكوّن غير مرئي يوفر معلومات الموقع، بما في ذلك خط الطول وخط العرض والارتفاع (إذا كان الجهاز يدعمه) والسرعة (إذا كان الجهاز يدعمها) والعنوان. ويمكنه أيضًا إجراء "الترميز الجغرافي"، أي تحويل عنوان معيّن (ليس بالضرورة العنوان الحالي) إلى خط عرض (باستخدام دالة <code>LatitudeFromAddress</code>) وخط طول (باستخدام دالة <code>LongitudeFromAddress</code>).</p><p>لكي يعمل المكوّن، يجب تعيين خاصية <code>Enabled</code> الخاصة به إلى True، ويجب أن يكون استشعار الموقع ممكّنًا في الجهاز عبر الشبكات اللاسلكية أو أقمار GPS الصناعية (إذا كان الجهاز في الخارج).</p>قد لا تكون معلومات الموقع متاحة فور بدء التطبيق. ستحتاج إلى الانتظار وقتًا قصيرًا حتى يتم العثور على مزود موقع واستخدامه، أو انتظار حدث LocationChanged
ListViewHelpStringComponentPallette=<p>هذا مكوّن مرئي يعرض قائمة من عناصر النص والصور.</p> <p>يمكن تعيين القوائم البسيطة من السلاسل باستخدام خاصية ElementsFromString. ويمكن إنشاء قوائم عناصر أكثر تعقيدًا تحتوي على سلاسل متعددة و/أو صور باستخدام خاصيتي ListData وListViewLayout. </p>
ListPickerHelpStringComponentPallette=<p>زر يعرض، عند النقر عليه، قائمة نصوص ليختار المستخدم منها. يمكن تحديد النصوص من خلال المصمم أو محرر الكتل بتعيين خاصية <code>ElementsFromString</code> إلى تجميع نصي مفصول بفواصل (على سبيل المثال، <em>choice 1, choice 2, choice 3</em>) أو بتعيين خاصية <code>Elements</code> إلى قائمة في محرر الكتل.</p><p>تعيين خاصية ShowFilterBar إلى true سيجعل القائمة قابلة للبحث. تؤثر خصائص أخرى في مظهر الزر (<code>TextAlignment</code> و<code>BackgroundColor</code> وغيرها) وفي ما إذا كان يمكن النقر عليه (<code>Enabled</code>).</p>
LinearProgressHelpStringComponentPallette=مكوّن مرئي يشير إلى تقدم عملية باستخدام شريط خطي متحرك.
LineStringHelpStringComponentPallette=LineString هو مكوّن لرسم تسلسل مفتوح ومتصل من الخطوط على الخريطة. لإضافة نقاط جديدة إلى LineString في المصمم، اسحب نقطة منتصف أي مقطع بعيدًا عن الخط لإدخال رأس جديد. انقل رأسًا بالنقر عليه وسحبه إلى موقع جديد. سيؤدي النقر على رأس إلى حذف ذلك الرأس، إلا إذا لم يتبقَّ سوى رأسين.
LightSensorHelpStringComponentPallette=مكوّن مستشعر يمكنه قياس مستوى الضوء.
LabelHelpStringComponentPallette=يعرض Label قطعة من النص، تُحدد من خلال خاصية <code>Text</code>. تتحكم خصائص أخرى، يمكن تعيينها كلها في المصمم أو محرر الكتل، في مظهر النص وموضعه.
ImageSpriteHelpStringComponentPallette=<p>كائن رسومي يمكن وضعه على <code>Canvas</code>، حيث يمكنه التفاعل مع اللمسات والسحب، والتفاعل مع الكائنات الرسومية الأخرى (مكوّنات <code>Ball</code> ومكوّنات <code>ImageSprite</code> الأخرى) ومع حافة لوحة الرسم، والتحرك وفقًا لقيم خصائصه. يكون مظهره هو الصورة المحددة في خاصية <code>Picture</code> الخاصة به (إلا إذا كانت خاصية <code>Visible</code> الخاصة به هي <code>False</code>).</p> <p>لجعل <code>ImageSprite</code> يتحرك 10 بكسلات إلى اليسار كل 1000 مللي ثانية (ثانية واحدة)، على سبيل المثال، يمكنك تعيين خاصية <code>Speed</code> إلى 10 [بكسلات]، وخاصية <code>Interval</code> إلى 1000 [مللي ثانية]، وخاصية <code>Heading</code> إلى 180 [درجة]، وخاصية <code>Enabled</code> إلى <code>True</code>. سيقوم الكائن الرسومي الذي تكون خاصية <code>Rotates</code> لديه <code>True</code> بتدوير صورته عند تغير <code>Heading</code> الخاص به. يتحقق فحص التصادم مع كائن رسومي مُدار حاليًا من موضع الكائن غير المُدار، لذلك سيكون فحص التصادم غير دقيق للكائنات الرسومية الطويلة الضيقة أو القصيرة العريضة التي تم تدويرها. يمكن تغيير أي من خصائص الكائن الرسومي في أي وقت تحت تحكم البرنامج.</p>
ImagePickerHelpStringComponentPallette=زر ذو غرض خاص. عندما يضغط المستخدم على منتقي الصور، يظهر معرض الصور في الجهاز، ويمكن للمستخدم اختيار صورة. بعد اختيار الصورة، تُحفظ، وستكون خاصية <code>Selected</code> هي اسم الملف الذي خُزنت فيه الصورة. حتى لا تمتلئ مساحة التخزين، سيُخزن 10 صور كحد أقصى. اختيار صور إضافية سيحذف الصور السابقة بالترتيب من الأقدم إلى الأحدث.
ImageHelpStringComponentPallette=مكوّن لعرض الصور. يمكن تحديد الصورة المراد عرضها والجوانب الأخرى من مظهر Image في المصمم أو في محرر الكتل.
ImageBotHelpStringComponentPallette=ImageBot هو مكوّن غير مرئي يستخدم DALL-E 2 لإنشاء الصور وتحريرها. يجب عليك توفير مفتاح OpenAI API الخاص بك لهذا المكوّن عن طريق تعيين خاصية ApiKey في الكتل.
HygrometerHelpStringComponentPallette=مكوّن مستشعر يمكنه قياس الرطوبة النسبية للهواء المحيط. لا تحتوي معظم أجهزة Android على هذا المستشعر.
HorizontalScrollArrangementHelpStringComponentPallette=<p>عنصر تنسيق توضع فيه المكوّنات التي يجب عرضها من اليسار إلى اليمين. إذا كنت تريد عرض المكوّنات واحدًا فوق الآخر، فاستخدم <code>VerticalArrangement</code> بدلًا من ذلك.</p><p>هذا الإصدار قابل للتمرير.
