ClockHelpStringComponentPallette=<p>مكوّن غير مرئي يوفر اللحظة الزمنية باستخدام الساعة الداخلية في الهاتف. يمكنه تشغيل مؤقّت على فواصل زمنية منتظمة وإجراء حسابات ومعالجات وتحويلات زمنية.</p> <p>تتوفر أيضًا دوال لتحويل اللحظة الزمنية إلى نص. الأنماط المقبولة هي السلسلة الفارغة، MM/DD/YYYY HH:mm:ss a، أو MMM d, yyyyHH:mm. ستوفر السلسلة الفارغة التنسيق الافتراضي، وهو "MMM d, yyyy HH:mm:ss a" ل FormatDateTime و"MMM d, yyyy" ل FormatDate. للاطلاع على كل التنسيقات الممكنة، يرجى الاطلاع <a href="https://docs.oracle.com/javase/7/docs/api/java/text/SimpleDateFormat.html" _target="_blank">هنا</a>. </p>
