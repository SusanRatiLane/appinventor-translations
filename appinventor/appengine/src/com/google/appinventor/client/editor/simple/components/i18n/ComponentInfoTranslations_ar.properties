HorizontalArrangementHelpStringComponentPallette=<p>عنصر تنسيق توضع فيه المكوّنات التي يجب عرضها من اليسار إلى اليمين. إذا كنت تريد عرض المكوّنات واحدًا فوق الآخر، فاستخدم <code>VerticalArrangement</code> بدلًا من ذلك.</p>
GyroscopeSensorHelpStringComponentPallette=<p>مكوّن غير مرئي يمكنه قياس السرعة الزاوية في ثلاثة أبعاد بوحدة الدرجات في الثانية.</p><p>لكي يعمل، يجب تعيين خاصية <code>Enabled</code> الخاصة بالمكوّن إلى True، ويجب أن يحتوي الجهاز على مستشعر جيروسكوب.</p>
GameClientHelpStringComponentPallette=يوفر طريقة للتطبيقات للتواصل مع خوادم الألعاب عبر الإنترنت
FusiontablesControlHelpStringComponentPallette=<p>مكوّن غير مرئي يتواصل مع Google Fusion Tables. تتيح لك Fusion Tables تخزين جداول البيانات ومشاركتها والاستعلام عنها وعرضها بصريًا؛ ويتيح لك هذا المكوّن الاستعلام عن هذه الجداول وإنشاءها وتعديلها.</p> <p><font color=red><b>ملاحظة:</b>&nbsp;أوقفت Google خدمة Fusion Tables في 3 ديسمبر 2019. لم يعد هذا المكوّن يعمل.</font></p> <p>يستخدم هذا المكوّن <a href="https://developers.google.com/fusiontables/docs/v2/getting_started" target="_blank">Fusion Tables API V2.0</a>. <p>يجب أن تصادق التطبيقات التي تستخدم Fusion Tables مع خوادم Google. يمكن القيام بذلك بطريقتين. الطريقة الأولى تستخدم مفتاح API يحصل عليه المطوّر (انظر أدناه). وبهذا الأسلوب يجب على المستخدمين النهائيين أيضًا تسجيل الدخول للوصول إلى Fusion Table. أما الطريقة الثانية فهي استخدام حساب خدمة. وبهذا الأسلوب تنشئ بيانات اعتماد و"Service Account Email Address" خاصًا تحصل عليه من <a href="https://code.google.com/apis/console/" target="_blank">Google APIs Console</a>. ثم تخبر Fusion Table Control باسم عنوان البريد الإلكتروني لحساب الخدمة، وترفع المفتاح السري كأصل إلى تطبيقك، وتعيّن خاصية KeyFile للإشارة إلى هذا الملف. وأخيرًا تحدد مربع الاختيار "UseServiceAuthentication" في المصمم. عند استخدام حساب خدمة، لا يحتاج المستخدمون النهائيون إلى تسجيل الدخول لاستخدام Fusion Tables، إذ يصادق حساب الخدمة الخاص بك على كل عمليات الوصول.</p> <p>للحصول على مفتاح API، اتبع هذه التعليمات.</p> <ol><li>انتقل إلى <a href="https://code.google.com/apis/console/" target="_blank">Google APIs Console</a> وسجّل الدخول إذا لزم الأمر.</li><li>اختر عنصر <i>Services</i> من القائمة الموجودة على اليسار.</li><li>اختر خدمة <i>Fusiontables</i> من القائمة المعروضة وشغّلها.</li><li>ارجع إلى القائمة الرئيسية واختر عنصر <i>API Access</i>. </li></ol><p>سيكون مفتاح API الخاص بك قريبًا من أسفل ذلك الجزء في القسم المسمى "Simple API Access". ستحتاج إلى تقديم ذلك المفتاح كقيمة لخاصية <i>ApiKey</i> في تطبيق Fusiontables الخاص بك.</p><p>بعد حصولك على مفتاح API، عيّن قيمة خاصية <i>Query</i> إلى استعلام Fusiontables SQL صالح واستدعِ <i>SendQuery</i> لتنفيذ الاستعلام. سيرسل App Inventor الاستعلام إلى خادم Fusion Tables وستُشغَّل كتلة <i>GotResult</i> عند إرجاع نتيجة من الخادم. ستُعاد نتائج الاستعلام بتنسيق CSV، ويمكن تحويلها إلى تنسيق قائمة باستخدام كتل "list from csv table" أو "list from csv row".</p><p>لاحظ أنك لا تحتاج إلى القلق بشأن ترميز UTF للاستعلام. لكن عليك التأكد من أن الاستعلام يتبع الصياغة الموضحة في <a href="https://developers.google.com/fusiontables/docs/v2/getting_started" target="_blank">الدليل المرجعي</a>، ما يعني أن أمورًا مثل حالة الأحرف في أسماء الأعمدة مهمة، وأنه يجب استخدام علامات اقتباس مفردة حول أسماء الأعمدة إذا كانت تحتوي على مسافات.</p>
FirebaseDBHelpStringComponentPallette=مكوّن غير مرئي يتواصل مع Firebase لتخزين المعلومات واسترجاعها.
FilePickerHelpStringComponentPallette=مكوّن <code>FilePicker</code> هو مكوّن يشبه الزر، وعندما ينقر عليه المستخدم سيطالبه باختيار ملف من النظام. يمكن أيضًا فتح المنتقي برمجيًا باستدعاء دالته <a href="/reference/components/media.html#FilePicker.Open" target="_blank">Open</a>. يتطلب استخدام FilePicker نظام Android 4.4 أو أحدث أو iOS 11 أو أحدث.
FileHelpStringComponentPallette=مكوّن غير مرئي لتخزين الملفات واسترجاعها. استخدم هذا المكوّن لكتابة الملفات أو قراءتها على جهازك. السلوك الافتراضي هو كتابة الملفات في دليل البيانات الخاص المرتبط بتطبيقك. يُعامل المصاحب بشكل خاص لكتابة الملفات في دليل عام لأغراض التصحيح. استخدم رابط مزيد من المعلومات لقراءة المزيد عن كيفية استخدام مكوّن File للمسارات والنطاقات لإدارة الوصول إلى الملفات.
FeatureCollectionHelpStringComponentPallette=تحتوي FeatureCollection على معلم خريطة واحد أو أكثر كمجموعة. أي أحداث تُطلق على معلم داخل المجموعة ستؤدي أيضًا إلى تشغيل الحدث المقابل على كائن المجموعة. ويمكن تحميل FeatureCollections من موارد خارجية كوسيلة لملء الخريطة بالمحتوى.
Ev3UltrasonicSensorHelpStringComponentPallette=مكوّن يوفر واجهة عالية المستوى لمستشعر فوق صوتي في روبوت LEGO MINDSTORMS EV3.
Ev3UIHelpStringComponentPallette=مكوّن يوفر واجهة عالية المستوى لروبوت LEGO MINDSTORMS EV3، مع دوال لرسم الرسومات البيانية على شاشة EV3.
Ev3TouchSensorHelpStringComponentPallette=مكوّن يوفر واجهة عالية المستوى لمستشعر لمس في روبوت LEGO MINDSTORMS EV3.
Ev3SoundHelpStringComponentPallette=مكوّن يوفر واجهة عالية المستوى لوظائف الصوت في روبوت LEGO MINDSTORMS EV3.
Ev3MotorsHelpStringComponentPallette=مكوّن يوفر واجهات عالية ومنخفضة المستوى لروبوت LEGO MINDSTORMS EV3، مع دوال يمكنها التحكم في المحركات.
Ev3GyroSensorHelpStringComponentPallette=مكوّن يوفر واجهة عالية المستوى لمستشعر جيروسكوب في روبوت LEGO MINDSTORMS EV3.
Ev3CommandsHelpStringComponentPallette=مكوّن يوفر واجهة منخفضة المستوى لروبوت LEGO MINDSTORMS EV3، مع دوال لإرسال أوامر النظام أو الأوامر المباشرة إلى روبوتات EV3.
Ev3ColorSensorHelpStringComponentPallette=مكوّن يوفر واجهة عالية المستوى لمستشعر ألوان في روبوت LEGO MINDSTORMS EV3.
EmailPickerHelpStringComponentPallette=EmailPicker هو نوع من مربعات النص. إذا بدأ المستخدم بإدخال اسم جهة اتصال أو عنوان بريدها الإلكتروني، فسيعرض الهاتف قائمة منسدلة بخيارات تُكمل الإدخال. إذا كان هناك عدد كبير من جهات الاتصال، فقد تستغرق القائمة المنسدلة عدة ثوانٍ للظهور، ويمكن أن تعرض نتائج وسيطة أثناء حساب المطابقات. <p>توجد المحتويات الأولية لمربع النص والمحتويات بعد إدخال المستخدم موجودة في خاصية <code>Text</code>. إذا كانت خاصية <code>Text</code> فارغة مبدئيًا، فستظهر محتويات خاصية <code>Hint</code> بشكل باهت في مربع النص كتلميح للمستخدم.</p> <p>تؤثر خصائص أخرى في مظهر مربع النص (<code>TextAlignment</code> و<code>BackgroundColor</code> وغيرها) وفي ما إذا كان يمكن استخدامه (<code>Enabled</code>).</p><p>عادةً ما تُستخدم مربعات النص مثل هذه مع مكوّنات <code>Button</code>، حيث ينقر المستخدم على الزر عند اكتمال إدخال النص.
DatePickerHelpStringComponentPallette=<p>زر يفتح، عند النقر عليه، مربع حوار منبثقًا يتيح للمستخدم اختيار تاريخ.</p>
DataFileHelpStringComponentPallette=مكوّن يسمح بقراءة بيانات CSV وJSON. يحتوي DataFile على وظائف متعلقة بالوصول إلى البيانات المحللة من CSV أو JSON على شكل صفوف أو أعمدة. يمكن استخدامه مع مكوّن ChartData2D لاستيراد البيانات مباشرة من ملف إلى المخطط. ويمكن أيضًا سحب المكوّن وإفلاته على مخطط بعد اختيار ملف وتحليله بنجاح لإنشاء مكوّنات ChartData تلقائيًا من الملف على المخطط.
ContactPickerHelpStringComponentPallette=زر يعرض، عند النقر عليه، قائمة جهات الاتصال للاختيار منها. بعد أن يحدد المستخدم اختيارًا، ستُعيّن الخصائص التالية بمعلومات عن جهة الاتصال المختارة: <ul><li> <code>ContactName</code>: اسم جهة الاتصال </li> <li> <code>EmailAddress</code>: عنوان البريد الإلكتروني الأساسي لجهة الاتصال </li> <li> <code>ContactUri</code>: عنوان URI لجهة الاتصال على الجهاز </li><li> <code>EmailAddressList</code>: قائمة بعناوين البريد الإلكتروني لجهة الاتصال </li> <li> <code>PhoneNumber</code>: رقم الهاتف الأساسي لجهة الاتصال (في إصدارات Android الأحدث)</li> <li> <code>PhoneNumberList</code>: قائمة بأرقام هاتف جهة الاتصال (في إصدارات Android الأحدث)</li> <li> <code>Picture</code>: اسم الملف الذي يحتوي على صورة جهة الاتصال، ويمكن استخدامه كقيمة لخاصية <code>Picture</code> لمكوّن <code>Image</code> أو <code>ImageSprite</code>.</li></ul></p><p>تؤثر خصائص أخرى في مظهر الزر (<code>TextAlignment</code> و<code>BackgroundColor</code> وغيرها) وفي ما إذا كان يمكن النقر عليه (<code>Enabled</code>).</p><p>قد لا يعمل مكوّن ContactPicker على كل الهواتف. على سبيل المثال، في أنظمة Android قبل النظام 3.0، لا يمكنه اختيار أرقام الهواتف، وستحتوي قائمة عناوين البريد الإلكتروني على بريد إلكتروني واحد فقط.
CloudDBHelpStringComponentPallette=مكوّن غير مرئي يتيح لك تخزين البيانات على خادم قاعدة بيانات متصل بالإنترنت (باستخدام برنامج Redis). يسمح هذا لمستخدمي تطبيقك بمشاركة البيانات فيما بينهم. افتراضيًا، ستُخزن البيانات على خادم تديره MIT، ومع ذلك يمكنك إعداد خادمك الخاص وتشغيله. عيّن خاصية "RedisServer" وخاصية "RedisPort" للوصول إلى خادمك الخاص.
CircularProgressHelpStringComponentPallette=مكوّن مرئي يشير إلى تقدم عملية باستخدام حلقة متحركة.
CircleHelpStringComponentPallette=دائرة
CheckBoxHelpStringComponentPallette=مربع اختيار يطلق حدثًا عندما ينقر عليه المستخدم. توجد خصائص كثيرة تؤثر في مظهره ويمكن تعيينها في المصمم أو محرر الكتل.
ChatBotHelpStringComponentPallette=مكوّن غير مرئي للتواصل مع روبوت محادثة يعمل بالذكاء الاصطناعي. يتواصل هذا المكوّن حاليًا مع وسيط تديره MIT ويستخدم بدوره واجهة ChatGPT API من OpenAI. ويُعد هذا المكوّن تجريبيًا.
ChartHelpStringComponentPallette=مكوّن يسمح بعرض البيانات بصريًا
ChartData2DHelpStringComponentPallette=مكوّن يحتفظ ببيانات مبنية على إحداثيات (x, y)
CanvasHelpStringComponentPallette=<p>لوحة مستطيلة ثنائية الأبعاد حساسة للمس يمكن الرسم عليها وتحريك الكائنات الرسومية فيها.</p> <p>يمكن تعيين خصائص <code>BackgroundColor</code> و<code>PaintColor</code> و<code>BackgroundImage</code> و<code>Width</code> و<code>Height</code> للوحة الرسم في المصمم أو في محرر الكتل. تُقاس <code>Width</code> و<code>Height</code> بالبكسلات ويجب أن تكونا موجبتين.</p><p>يمكن تحديد أي موقع على لوحة الرسم كزوج من قيم (X, Y)، حيث <ul> <li>X هو عدد البكسلات بعيدًا عن الحافة اليسرى للوحة الرسم</li><li>Y هو عدد البكسلات بعيدًا عن الحافة العلوية للوحة الرسم</li></ul>.</p> <p>توجد أحداث تُبلغ متى وأين تم لمس لوحة الرسم أو سحب <code>Sprite</code> (<code>ImageSprite</code> أو <code>Ball</code>). وتوجد أيضًا دوال لرسم النقاط والخطوط والدوائر.</p>
CameraHelpStringComponentPallette=مكوّن لالتقاط صورة باستخدام كاميرا الجهاز. بعد التقاط الصورة، يكون اسم الملف الموجود على الهاتف والذي يحتوي على الصورة متاحًا كوسيط في حدث AfterPicture. ويمكن استخدام اسم الملف، على سبيل المثال، لتعيين خاصية Picture لمكوّن Image.
CamcorderHelpStringComponentPallette=مكوّن لتسجيل فيديو باستخدام كاميرا الفيديو في الجهاز. بعد تسجيل الفيديو، يكون اسم الملف الموجود على الهاتف والذي يحتوي على المقطع متاحًا كوسيط في حدث AfterRecording. ويمكن استخدام اسم الملف، على سبيل المثال، لتعيين خاصية المصدر لمكوّن VideoPlayer.
ButtonHelpStringComponentPallette=زر لديه القدرة على اكتشاف النقرات. يمكن تغيير كثير من جوانب مظهره، وكذلك ما إذا كان قابلًا للنقر (<code>Enabled</code>)، في المصمم أو في محرر الكتل.
BluetoothServerHelpStringComponentPallette=مكوّن خادم Bluetooth
BluetoothClientHelpStringComponentPallette=مكوّن عميل Bluetooth
BarometerHelpStringComponentPallette=مكوّن مستشعر يمكنه قياس ضغط الهواء المحيط.
BarcodeScannerHelpStringComponentPallette=مكوّن لاستخدام قارئ الرموز الشريطية لقراءة رمز شريطي
BallHelpStringComponentPallette=<p>كائن رسومي دائري يمكن وضعه على <code>Canvas</code>، حيث يمكنه التفاعل مع اللمسات والسحب، والتفاعل مع الكائنات الرسومية الأخرى (<code>ImageSprite</code> ومكوّنات <code>Ball</code> الأخرى) ومع حافة لوحة الرسم، والتحرك وفقًا لقيم خصائصه.</p><p>على سبيل المثال، لجعل <code>Ball</code> يتحرك 4 بكسلات نحو أعلى <code>Canvas</code> كل 500 مللي ثانية (نصف ثانية)، اضبط خاصية <code>Speed</code> على 4 [بكسلات]، وخاصية <code>Interval</code> على 500 [مللي ثانية]، وخاصية <code>Heading</code> على 90 [درجة]، وخاصية <code>Enabled</code> على <code>True</code>.</p><p>الفرق بين <code>Ball</code> و<code>ImageSprite</code> هو أن الثاني يمكنه أخذ مظهره من ملف صورة، بينما لا يمكن تغيير مظهر <code>Ball</code> إلا بتغيير خاصيتي <code>PaintColor</code> و<code>Radius</code>.</p>
AnomalyDetectionHelpStringComponentPallette=مكوّن يحتوي على نماذج لاكتشاف الشذوذ
AccelerometerSensorHelpStringComponentPallette=مكوّن غير مرئي يمكنه اكتشاف الاهتزاز وقياس التسارع تقريبًا في ثلاثة أبعاد باستخدام وحدات النظام الدولي (m/s<sup>2</sup>). القيم هي: <ul><li> <strong>xAccel</strong>: تكون 0 عندما يكون الهاتف ساكنًا على سطح مستوٍ، وموجبة عندما يُمال الهاتف إلى اليمين (أي عندما يرتفع جانبه الأيسر)، وسالبة عندما يُمال الهاتف إلى اليسار (أي عندما يرتفع جانبه الأيمن).</li> <li> <strong>yAccel</strong>: تكون 0 عندما يكون الهاتف ساكنًا على سطح مستوٍ، وموجبة عندما يرتفع أسفله، وسالبة عندما يرتفع أعلاه. </li> <li> <strong>zAccel</strong>: تساوي -9.8 (جاذبية الأرض بالمتر لكل ثانية لكل ثانية) عندما يكون الجهاز ساكنًا وموازيًا للأرض والشاشة متجهة إلى الأعلى، و0 عندما يكون عموديًا على الأرض، و+9.8 عندما تكون الشاشة متجهة إلى الأسفل. ويمكن أن تتأثر القيمة أيضًا بتسريع الجهاز مع الجاذبية أو عكسها. </li></ul>
