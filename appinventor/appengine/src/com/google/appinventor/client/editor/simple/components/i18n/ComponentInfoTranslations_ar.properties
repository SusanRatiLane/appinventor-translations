ActivityStarterHelpStringComponentPallette=مكوّن يمكنه تشغيل نشاط باستخدام الدالة <code>StartActivity</code>. <p>تشمل الأنشطة التي يمكن تشغيلها:<ul> <li> بدء تطبيق App Inventor آخر لنظام Android. للقيام بذلك، اعرف أولًا <em>الصنف</em> الخاص بالتطبيق الآخر عن طريق تنزيل الشيفرة المصدرية واستخدام مستكشف ملفات أو أداة فك ضغط للعثور على ملف باسم "youngandroidproject/project.properties". سيبدأ السطر الأول من الملف ب"main=" متبوعًا باسم الصنف؛ على سبيل المثال، <code>main=com.gmail.Bitdiddle.Ben.HelloPurr.Screen1</code>. (تشير المكونات الأولى إلى أنه أُنشئ بواسطة Ben.Bitdiddle
TextingHelpStringComponentPallette=<p>مكوّن سيقوم، عند استدعاء الدالة <code>SendMessage</code>، بإرسال الرسالة النصية المحددة في خاصية <code>Message</code> إلى رقم الهاتف المحدد في خاصية <code>PhoneNumber</code>.</p> <p>إذا عُيّنت خاصية <code>ReceivingEnabled</code> إلى 1 فلن تُستقبل الرسائل <b>على الإطلاق</b>. إذا عُيّنت <code>ReceivingEnabled</code> إلى 2 فستُستقبل الرسائل فقط عندما يكون التطبيق قيد التشغيل. وأخيرًا، إذا عُيّنت <code>ReceivingEnabled</code> إلى 3، فستُستقبل الرسائل عندما يكون التطبيق قيد التشغيل، <b>و</b>عندما لا يكون التطبيق قيد التشغيل ستوضع في قائمة انتظار وسيُعرض إشعار للمستخدم.</p> <p>عند وصول رسالة، يُطلق حدث <code>MessageReceived</code> ويقدم الرقم المُرسل والرسالة.</p> <p> سيستقبل التطبيق الذي يتضمن هذا المكوّن الرسائل حتى عندما يكون في الخلفية (أي عندما لا يكون ظاهرًا على الشاشة)، بل وحتى إذا لم يكن التطبيق قيد التشغيل، ما دام مثبتًا على الهاتف. إذا تلقى الهاتف رسالة نصية عندما لا يكون التطبيق في المقدمة، فسيعرض الهاتف إشعارًا في شريط الإشعارات. سيؤدي اختيار الإشعار إلى إظهار التطبيق. بصفتك مطوّر تطبيق، ستحتاج على الأرجح إلى منح المستخدمين القدرة على التحكم في ReceivingEnabled حتى يتمكنوا من جعل الهاتف يتجاهل الرسائل النصية.</p> <p>إذا كانت خاصية GoogleVoiceEnabled صحيحة، فيمكن إرسال الرسائل عبر Wifi باستخدام Google Voice. يتطلب هذا الخيار أن يكون لدى المستخدم حساب Google Voice وأن يكون تطبيق Voice المحمول مثبتًا على الهاتف. يعمل خيار Google Voice فقط على الهواتف التي تدعم Android 2.0 (Eclair) أو أعلى.</p> <p>لتحديد رقم الهاتف (مثل 650-555-1212)، عيّن خاصية <code>PhoneNumber</code> إلى سلسلة نصية تحتوي على الأرقام المحددة (مثل 6505551212). يمكن تضمين الشرطات والنقاط والأقواس (مثل (650)-555-1212) لكنها ستُتجاهل؛ ولا يمكن تضمين المسافات.</p> <p>هناك طريقة أخرى تسمح للتطبيق بتحديد رقم هاتف، وهي تضمين مكوّن <code>PhoneNumberPicker</code>، الذي يتيح للمستخدمين اختيار رقم هاتف من الأرقام المخزنة في جهات اتصال الهاتف.</p>
