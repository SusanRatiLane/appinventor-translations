IsAuthorizedEventDescriptions=يُطلق هذا الحدث بعد أن يستدعي البرنامج <code>Authorize</code> إذا نجح التفويض. ويُستدعى أيضًا بعد استدعاء <code>CheckAuthorized</code> إذا كان لدينا بالفعل رمز وصول صالح. بعد إطلاق هذا الحدث، يمكن استدعاء أي دالة أخرى لهذا المكوّن.
