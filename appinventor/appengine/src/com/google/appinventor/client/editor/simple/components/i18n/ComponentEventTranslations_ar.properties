IncomingCallAnsweredEvents=الرد على مكالمة واردة
IncomingCallAnsweredEventDescriptions=حدث يشير إلى الرد على مكالمة هاتفية واردة. phoneNumber هو رقم هاتف المكالمة الواردة.
Image__ClickEventDescriptions=حدث يقع عند النقر على صورة.
ImageSprite__TouchedEventDescriptions=معالج حدث يُستدعى عندما يلمس المستخدم كائن صورة مفعّلًا ثم يرفع إصبعه فورًا. تكون إحداثيات x و y المقدّمة نسبةً إلى الزاوية العلوية اليسرى للوحة الرسم.
ImageSprite__TouchUpEventDescriptions=معالج حدث يُستدعى عندما يتوقف المستخدم عن لمس كائن صورة مفعّل (برفع إصبعه بعد حدث TouchDown). يوفّر هذا الحدث إحداثيي x و y للمس، نسبةً إلى الزاوية العلوية اليسرى للوحة الرسم.
ImageSprite__TouchDownEventDescriptions=معالج حدث يُستدعى عندما يبدأ المستخدم بلمس كائن صورة مفعّل (بوضع إصبعه على كائن الصورة وتركه هناك). يوفّر هذا الحدث إحداثيي x و y للمس، نسبةً إلى الزاوية العلوية اليسرى للوحة الرسم.
ImageSprite__FlungEventDescriptions=معالج حدث يُستدعى عند تنفيذ إيماءة قذف (تمرير سريع) على كائن صورة مفعّل. يوفّر هذا الحدث إحداثيي x و y لبداية القذف (نسبةً إلى الزاوية العلوية اليسرى للوحة الرسم)، والسرعة (بالبكسل لكل مللي ثانية)، والاتجاه (-180 إلى 180 درجة)، ومركّبتي السرعة x و y لمتجه القذف.
ImageSprite__EdgeReachedEventDescriptions=معالج حدث يُستدعى عندما يصل كائن الصورة إلى حافة الشاشة. إذا استُدعيت Bounce بعد ذلك مع تلك الحافة، فسيبدو كائن الصورة وكأنه يرتد عن الحافة التي وصل إليها. تُمثَّل الحافة هنا بعدد صحيح يشير إلى أحد الاتجاهات الثمانية: الشمال (1)، الشمال الشرقي (2)، الشرق (3)، الجنوب الشرقي (4)، الجنوب (-1)، الجنوب الغربي (-2)، الغرب (-3)، والشمال الغربي (-4).
ImageSprite__DraggedEventDescriptions=معالج حدث يُستدعى عند سحب كائن صورة. في جميع الاستدعاءات، تكون إحداثيات البداية هي المكان الذي لُمست فيه الشاشة أول مرة، وتصف الإحداثيات «الحالية» نقطة نهاية مقطع الخط الحالي. في أول استدعاء ضمن عملية سحب معيّنة، تكون الإحداثيات «السابقة» هي نفسها إحداثيات البداية؛ وبعد ذلك تكون هي الإحداثيات «الحالية» من الاستدعاء السابق. لاحظ أن كائن الصورة لن يتحرك فعليًا استجابةً لحدث Dragged ما لم يتم استدعاء MoveTo صراحةً. وللحصول على حركة سلسة، ينبغي ضبط كل إحداثي من إحداثياته على مجموع قيمته الأولية والفرق بين قيمته الحالية والسابقة.
