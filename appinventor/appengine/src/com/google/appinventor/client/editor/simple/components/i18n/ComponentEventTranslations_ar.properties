Circle__ClickEventDescriptions=نقر المستخدم على الدائرة.
ChoosingCanceledEvents=إلغاء الاختيار
ChoosingCanceledEventDescriptions=حدث يُطلق عندما يلغي المستخدم ShowChooseDialog.
CheckBox__LostFocusEventDescriptions=لم تعد خانة الاختيار هي المكوّن الذي يملك التركيز.
CheckBox__GotFocusEventDescriptions=أصبحت خانة الاختيار هي المكوّن الذي يملك التركيز.
CheckBox__ChangedEventDescriptions=نقر المستخدم على خانة الاختيار ثم أفلت الضغط عنها.
ChatBot__ErrorOccurredEventDescriptions=سيُشغَّل حدث ErrorOccurred عند حدوث خطأ أثناء المعالجة، مثل تجاوز حصة الاستخدام أو ظهور خطأ آخر أرسله ChatGPT أو PaLM. راجع https://appinv.us/chatbot للحصول على أحدث المعلومات.
Chart__EntryClickEventDescriptions=يشير إلى أن المستخدم نقر على إدخال بيانات في `Chart`. يتم الإبلاغ عن السلسلة المحددة، إضافةً إلى قيمتي x و y الخاصة بها.
ChartData2D__EntryClickEventDescriptions=يشير إلى أن المستخدم نقر على نقطة بيانات في المخطط. يتم الإبلاغ عن قيمتي x و y للإدخال الذي تم النقر عليه.
ChangedEvents=تغيّر
Canvas__TouchedEventDescriptions=عندما يلمس المستخدم لوحة الرسم ثم يرفع إصبعه فورًا: يوفّر الحدث موضع (x,y) للمس، نسبةً إلى الزاوية العلوية اليسرى للوحة الرسم. تكون TouchedAnySprite صحيحة إذا لمس اللمس نفسه كائنًا رسوميًا أيضًا، وتكون خاطئة خلاف ذلك.
Canvas__FlungEventDescriptions=عند تنفيذ إيماءة قذف (تمرير سريع) على لوحة الرسم: يوفّر الحدث موضع (x,y) لبداية القذف، نسبةً إلى الزاوية العلوية اليسرى للوحة الرسم. كما يوفّر السرعة (بالبكسل لكل مللي ثانية) والاتجاه (-180 إلى 180 درجة) للقذف، إضافةً إلى مركّبتي السرعة x و y لمتجه القذف. تكون قيمة "flungSprite" صحيحة إذا كان هناك كائن رسومي قريب من نقطة بداية إيماءة القذف.
Canvas__DraggedEventDescriptions=عندما ينفّذ المستخدم سحبًا من نقطة (prevX, prevY) إلى نقطة أخرى (x, y). يوضّح الزوج (startX, startY) المكان الذي لمس فيه المستخدم الشاشة أول مرة، ويشير "draggedAnySprite" إلى ما إذا كان يتم سحب كائن رسومي.
CalibrationFailedEvents=فشل المعايرة
CalibrationFailedEventDescriptions=تم إهمال هذا الحدث.
Button__TouchUpEventDescriptions=يشير إلى أنه تم تحرير الزر.
Button__TouchDownEventDescriptions=يشير إلى أنه تم الضغط على الزر.
Button__LostFocusEventDescriptions=يشير إلى أن المؤشر ابتعد عن الزر، ولذلك لم يعد من الممكن النقر عليه.
Button__LongClickEventDescriptions=أبقى المستخدم الزر مضغوطًا.
Button__GotFocusEventDescriptions=يشير إلى أن المؤشر انتقل فوق الزر، ولذلك أصبح من الممكن النقر عليه.
Button__ClickEventDescriptions=نقر المستخدم على الزر ثم أفلت الضغط عنه.
BoundsChangeEvents=تغيّر الحدود
BoundsChangeEventDescriptions=غيّر المستخدم حدود الخريطة من خلال تحريك الخريطة أو تكبيرها/تصغيرها.
BluetoothErrorEventDescriptions=لم يعد حدث BluetoothError مستخدمًا. يُرجى استخدام حدث Screen.ErrorOccurred بدلًا منه.
BelowRangeEvents=تحت النطاق
BeforeSpeakingEvents=قبل النطق
BeforeSpeakingEventDescriptions=حدث يُطلق عند استدعاء Speak، قبل نطق الرسالة.
BeforePickingEvents=قبل الانتقاء
BeforePageLoadEvents=قبل تحميل الصفحة
BeforePageLoadEventDescriptions=عندما تكون الصفحة على وشك التحميل، يُشغَّل هذا الحدث.
BeforeGettingTextEvents=قبل الحصول على النص
BeforeGettingTextEventDescriptions=حدث بسيط يُطلق عند استدعاء `SpeechRecognizer` ولكن قبل بدء نشاطه.
Ball__TouchedEventDescriptions=معالج حدث يُستدعى عندما يلمس المستخدم كرة مفعّلة ثم يرفع إصبعه فورًا. تكون إحداثيات x و y المقدّمة نسبةً إلى الزاوية العلوية اليسرى للوحة الرسم.
Ball__TouchUpEventDescriptions=معالج حدث يُستدعى عندما يتوقف المستخدم عن لمس كرة مفعّلة (برفع إصبعه بعد حدث TouchDown). يوفّر هذا الحدث إحداثيي x و y للمس، نسبةً إلى الزاوية العلوية اليسرى للوحة الرسم.
Ball__TouchDownEventDescriptions=معالج حدث يُستدعى عندما يبدأ المستخدم بلمس كرة مفعّلة (بوضع إصبعه على الكرة وتركه هناك). يوفّر هذا الحدث إحداثيي x و y للمس، نسبةً إلى الزاوية العلوية اليسرى للوحة الرسم.
Ball__FlungEventDescriptions=معالج حدث يُستدعى عند تنفيذ إيماءة قذف (تمرير سريع) على كرة مفعّلة. يوفّر هذا الحدث إحداثيي x و y لبداية القذف (نسبةً إلى الزاوية العلوية اليسرى للوحة الرسم)، والسرعة (بالبكسل لكل مللي ثانية)، والاتجاه (-180 إلى 180 درجة)، ومركّبتي السرعة x و y لمتجه القذف.
Ball__EdgeReachedEventDescriptions=معالج حدث يُستدعى عندما تصل الكرة إلى حافة الشاشة. إذا استُدعيت Bounce بعد ذلك مع تلك الحافة، فستبدو الكرة وكأنها ترتد عن الحافة التي وصلت إليها. تُمثَّل الحافة هنا بعدد صحيح يشير إلى أحد الاتجاهات الثمانية: الشمال (1)، الشمال الشرقي (2)، الشرق (3)، الجنوب الشرقي (4)، الجنوب (-1)، الجنوب الغربي (-2)، الغرب (-3)، والشمال الغربي (-4).
Ball__DraggedEventDescriptions=معالج حدث يُستدعى عند سحب الكرة. في جميع الاستدعاءات، تكون إحداثيات البداية هي المكان الذي لُمست فيه الشاشة أول مرة، وتصف الإحداثيات «الحالية» نقطة نهاية مقطع الخط الحالي. في أول استدعاء ضمن عملية سحب معيّنة، تكون الإحداثيات «السابقة» هي نفسها إحداثيات البداية؛ وبعد ذلك تكون هي الإحداثيات «الحالية» من الاستدعاء السابق. لاحظ أن الكرة لن تتحرك فعليًا استجابةً لحدث Dragged ما لم يتم استدعاء MoveTo صراحةً. وللحصول على حركة سلسة، ينبغي ضبط كل إحداثي من إحداثياتها على مجموع قيمته الأولية والفرق بين قيمته الحالية والسابقة.
BackPressedEvents=الضغط على زر الرجوع
BackPressedEventDescriptions=تم الضغط على زر الرجوع في الجهاز.
AirPressureChangedEvents=تغيّر ضغط الهواء
AirPressureChangedEventDescriptions=يُستدعى عند اكتشاف تغيّر في ضغط الهواء (مقدّمًا بوحدة hPa).
AfterTimeSetEvents=بعد ضبط الوقت
AfterTimeSetEventDescriptions=يُشغَّل هذا الحدث عندما يضبط المستخدم الوقت في مربع الحوار المنبثق.
AfterTextInputEvents=بعد إدخال النص
AfterSpeakingEvents=بعد النطق
AfterSpeakingEventDescriptions=حدث يُطلق بعد نطق الرسالة. ستكون النتيجة true إذا نُطقت الرسالة بنجاح، وإلا فستكون false.
AfterSoundRecordedEvents=بعد تسجيل الصوت
AfterSoundRecordedEventDescriptions=يوفّر موقع الصوت الذي تم إنشاؤه حديثًا.
AfterSelectingEvents=بعد التحديد
AfterSelectingEventDescriptions=حدث يُستدعى بعد أن يختار المستخدم عنصرًا من القائمة المنسدلة.
AfterScanEvents=بعد المسح
AfterRecordingEvents=بعد التسجيل
AfterRecordingEventDescriptions=يشير إلى أنه تم تسجيل فيديو بالكاميرا، ويوفّر المسار إلى الفيديو المخزّن.
AfterPictureEvents=بعد التقاط الصورة
AfterPictureEventDescriptions=يُستدعى بعد التقاط الصورة. وسيط النص `image` هو المسار الذي يمكن استخدامه لتحديد موقع الصورة على الهاتف.
AfterPickingEvents=بعد الانتقاء
AfterGettingTextEvents=بعد الحصول على النص
AfterFileSavedEvents=بعد حفظ الملف
AfterFileSavedEventDescriptions=حدث يشير إلى أن محتويات الملف قد كُتبت.
AfterDateSetEvents=بعد ضبط التاريخ
AfterChoosingEvents=بعد الاختيار
AfterChoosingEventDescriptions=حدث يُطلق بعد أن يختار المستخدم خيارًا من ShowChooseDialog.
AfterActivityEvents=بعد النشاط
AfterActivityEventDescriptions=حدث يُطلق بعد عودة هذا المكوّن ActivityStarter.
ActivityErrorEventDescriptions=لم يعد حدث ActivityError مستخدمًا. يُرجى استخدام حدث Screen.ErrorOccurred بدلًا منه.
ActivityCanceledEvents=إلغاء النشاط
ActivityCanceledEventDescriptions=حدث يُطلق إذا عاد هذا المكوّن ActivityStarter لأن النشاط أُلغي.
AccelerationChangedEvents=تغيّر التسارع
AccelerationChangedEventDescriptions=يشير إلى أن التسارع تغيّر في أبعاد X و/أو Y و/أو Z.
AboveRangeEvents=فوق النطاق
