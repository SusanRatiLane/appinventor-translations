FriendTimelinePropertyDescriptions=تحتوي هذه الخاصية على أحدث 20 رسالة للمستخدمين الذين تتم متابعتهم. في البداية تكون القائمة فارغة. لتعيينها، يجب على البرنامج: <ol> <li> استدعاء طريقة <code>Authorize</code>.</li> <li> انتظار حدث <code>IsAuthorized</code>.</li> <li> تحديد المستخدمين المراد متابعتهم باستدعاء واحد أو أكثر لطريقة <code>Follow</code>.</li> <li> استدعاء طريقة <code>RequestFriendTimeline</code>.</li> <li> انتظار حدث <code>FriendTimelineReceived</code>.</li> </ol>بعد ذلك ستُضبط قيمة هذه الخاصية على قائمة الرسائل (وستحافظ على قيمتها حتى أي استدعاء لاحق ل <code>RequestFriendTimeline</code>.
