DataSourceKeyPropertyDescriptions=يضبط معرّف مفتاح مصدر البيانات للقيمة المراد استيرادها من مصدر البيانات المرفق. مثال ذلك وسم مكوّن TinyDB الذي يحدد القيمة. هذه الخاصية خاصة بالمصمم فقط، وينبغي تغييرها بعد تعيين مكوّن Source الخاص بمكوّن بيانات المخطط. فيما يلي قائمة كاملة بالقيم القابلة للتطبيق لكل مصدر متوافق: * بالنسبة إلى TinyDB وCloudDB، تكون هذه قيمة الوسم. * بالنسبة إلى AccelerometerSensor، يجب أن تكون القيمة إحدى القيم التالية: X أو Y أو Z * بالنسبة إلى GyroscopeSensor، يجب أن تكون القيمة إحدى القيم التالية: X أو Y أو Z * بالنسبة إلى LocationSensor، يجب أن تكون القيمة إحدى القيم التالية: latitude أو longitude أو altitude أو speed * بالنسبة إلى OrientationSensor، يجب أن تكون القيمة إحدى القيم التالية: pitch أو azimuth أو roll * بالنسبة إلى Pedometer، يجب أن تكون القيمة إحدى القيم التالية: WalkSteps أو SimpleSteps أو Distance * بالنسبة إلى ProximitySensor، يجب أن تكون القيمة distance. * بالنسبة إلى BluetoothClient، تمثل القيمة البادئة المراد إزالتها من القيمة. على سبيل المثال، إذا كانت القيم تأتي بالتنسيق "t:12"، فيمكن تحديد البادئة على أنها "t:"، وبعد ذلك ستُزال البادئة من البيانات. لا يمكن تحديد أي قيمة إذا كانت القيم المعادة رقمية بحتة.
