PersistPropertyDescriptions=إذا كانت القيمة صحيح، فستحتفظ المتغيرات بقيمها عندما يكون التطبيق غير متصل بالإنترنت ويخرج التطبيق. ستُرفع القيم إلى Firebase في المرة التالية التي يعمل فيها التطبيق وهو متصل بالشبكة. يفيد ذلك للتطبيقات التي تجمع بيانات أثناء عدم الاتصال بالشبكة. ملاحظة: لن تعمل AppendValue وRemoveFirst بشكل صحيح عند عدم الاتصال بالإنترنت؛ فهما تتطلبان اتصالًا بالشبكة.<br/><br/> <i>ملاحظة</i>: إذا ضبطت Persist على أي مكوّن Firebase، في أي شاشة، فسيجعل ذلك كل مكوّنات Firebase في كل الشاشات مستمرة. هذا قيد في مكتبة Firebase منخفضة المستوى. انتبه أيضًا إلى أنك إذا أردت ضبط persist على true، فينبغي فعل ذلك قبل الاتصال بالمصاحب للتطوير التزايدي.
