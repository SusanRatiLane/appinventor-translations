AccelerometerSensor__LegacyModePropertyDescriptions=قبل الإصدار الذي أضاف هذه الخاصية، كان مكوّن حساس التسارع يمرر قيم الحساس مباشرة كما يتلقاها من نظام Android. لكن هذه القيم لا تعوّض الأجهزة اللوحية التي يكون وضعها الافتراضي أفقيًا، مما كان يتطلب من مبرمج MIT App Inventor إجراء التعويض. غير أن هذا التعويض كان يؤدي إلى نتائج غير صحيحة في الأجهزة ذات الوضع العمودي مثل الهواتف. نحن الآن نكتشف الأجهزة اللوحية ذات الوضع الأفقي ونجري التعويض. لكن إذا كان مشروعك يعوض هذا التغيير بالفعل، فستحصل الآن على نتائج غير صحيحة. مع أن الحل المفضل لدينا هو تحديث مشروعك، يمكنك أيضًا تعيين هذه الخاصية إلى “true” وسيتم إلغاء تنشيط كود التعويض لدينا. ملاحظة: نوصي بتحديث مشروعك لأننا قد نزيل هذه الخاصية في إصدار مستقبلي.
