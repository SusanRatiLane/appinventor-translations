ReceivingEnabledPropertyDescriptions=إذا ضُبطت على 1 (OFF)، فلن تُستقبل أي رسائل. وإذا ضُبطت على 2 (FOREGROUND) أو 3 (ALWAYS)، فسيستجيب المكوّن للرسائل إذا كان قيد التشغيل. إذا لم يكن التطبيق قيد التشغيل، فسيتم تجاهل الرسالة عند الضبط على 2 (FOREGROUND). وإذا ضُبطت على 3 (ALWAYS) ولم يكن التطبيق قيد التشغيل، فسيعرض الهاتف إشعارًا. يؤدي اختيار الإشعار إلى فتح التطبيق وإطلاق حدث MessageReceived. ستُصفّ الرسائل المستلمة عندما يكون التطبيق خامدًا، ولذلك قد تظهر عدة أحداث MessageReceived عندما يستيقظ التطبيق. بصفتك مطور تطبيق، من الجيد أن تمنح المستخدمين تحكمًا في هذه الخاصية كي يمكنهم جعل هواتفهم تتجاهل الرسائل النصية عند تثبيت تطبيقك.
