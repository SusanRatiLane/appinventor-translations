# Description: 
bashWarningDialogMessage=<p><font color=red>تحذير:</font> تم فتح جلسة ثانية من App Inventor لهذا الحساب. يمكنك اختيار المتابعة بكلتا الجلستين، لكن العمل في App Inventor من أكثر من جلسة في الوقت نفسه قد يؤدي إلى فقدان الكتل بطرق لا يمكن استعادتها من خادم App Inventor.</p><p>نوصي بعدم فتح جلسات متعددة على الحساب نفسه. ولكن إذا احتجت إلى العمل بهذه الطريقة، فعليك تصدير مشروعك بانتظام إلى جهازك المحلي، حتى تكون لديك نسخة احتياطية مستقلة عن خادم App Inventor. استخدم "تصدير" من قائمة المشاريع لتصدير المشروع.</p>
