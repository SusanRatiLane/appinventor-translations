# Description: Confirmation message shown when keystore is about to be overwritten.
confirmOverwriteKeystore=هل تريد استبدال ملف مخزن المفاتيح؟ إذا وافقت، فسيُزال ملف مخزن المفاتيح القديم بالكامل من خادم App Inventor. إذا كنت قد نشرت تطبيقات في متجر Google Play باستخدام مخزن المفاتيح الذي توشك على استبداله، فستفقد القدرة على تحديث تطبيقاتك. أي مشاريع تحزمها في المستقبل ستُوقَّع باستخدام ملف مخزن المفاتيح الجديد. يؤثر تغيير مخزن المفاتيح في القدرة على إعادة تثبيت التطبيقات المثبتة سابقًا. إذا لم تكن متأكدًا من رغبتك في القيام بذلك، يرجى قراءة الوثائق حول مخازن المفاتيح بالنقر أعلاه على "مساعدة"، ثم "استكشاف الأخطاء وإصلاحها"، ثم "مخازن المفاتيح وتوقيع التطبيقات". لا يمكن التراجع عن استبدال ملف مخزن المفاتيح.
