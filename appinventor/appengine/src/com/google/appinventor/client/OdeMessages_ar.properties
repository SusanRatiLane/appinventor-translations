# Description: Confirmation message for delete keystore
confirmDeleteKeystore=هل تريد حقًا حذف ملف مخزن المفاتيح؟ إذا وافقت، فسيُزال ملف مخزن المفاتيح القديم بالكامل من خادم App Inventor. سيتم إنشاء ملف مخزن مفاتيح جديد، لكنه مختلف، تلقائيًا في المرة التالية التي تحزم فيها مشروعًا للهاتف. إذا كنت قد نشرت تطبيقات في متجر Google Play باستخدام مخزن المفاتيح الذي توشك على حذفه، فستفقد القدرة على تحديث تطبيقاتك. أي مشاريع تحزمها في المستقبل ستُوقَّع باستخدام ملف مخزن المفاتيح الجديد. يؤثر تغيير مخزن المفاتيح في القدرة على إعادة تثبيت التطبيقات المثبتة سابقًا. إذا لم تكن متأكدًا من رغبتك في القيام بذلك، يرجى قراءة الوثائق حول مخازن المفاتيح بالنقر أعلاه على "مساعدة"، ثم "استكشاف الأخطاء وإصلاحها"، ثم "مخازن المفاتيح وتوقيع التطبيقات". لا يمكن التراجع عن حذف ملف مخزن المفاتيح.
